<!DOCTYPE html>
<html lang="de">

<head>
	<meta charset="UTF-8" />
	<title>ABAP Comment-Generator</title>
	<style>
		body {
			font-family: system-ui, Arial, sans-serif;
			margin: 0;
			min-height: 100vh;
			background: radial-gradient(circle at top, #1e3a8a, #020617);
			color: #e5e7eb;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.card {
			width: 800px;
			max-width: 95%;
			background: rgba(255, 255, 255, 0.05);
			backdrop-filter: blur(20px);
			border-radius: 20px;
			padding: 25px;
			box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
			border: 1px solid rgba(255, 255, 255, 0.1);
		}

		h2 {
			margin: 0 0 15px;
			font-size: 22px;
			letter-spacing: 0.5px;
		}

		textarea {
			width: 100%;
			height: 120px;
			padding: 14px;
			border-radius: 14px;
			border: 1px solid rgba(255, 255, 255, 0.1);
			background: rgba(0, 0, 0, 0.4);
			color: white;
			resize: vertical;
			outline: none;
			margin-bottom: 20px;
			transition: 0.2s;
		}

		textarea:focus {
			border-color: #38bdf8;
			box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.3);
		}

		.code-wrapper {
			position: relative;
			cursor: pointer;
		}

		pre {
			margin: 0;
			padding: 18px;
			border-radius: 16px;
			background: linear-gradient(135deg, #020617, #020617 60%, #0f172a);
			color: #38bdf8;
			font-size: 13px;
			line-height: 1.5;
			white-space: pre-wrap;
			box-shadow: inset 0 0 20px rgba(56, 189, 248, 0.1), 0 10px 30px rgba(0, 0, 0, 0.5);
			transition: transform 0.15s, box-shadow 0.15s;
		}

		.code-wrapper:hover pre {
			transform: scale(1.01);
			box-shadow: inset 0 0 25px rgba(56, 189, 248, 0.2), 0 15px 40px rgba(0, 0, 0, 0.7);
		}

		.hint {
			position: absolute;
			top: 10px;
			right: 15px;
			font-size: 11px;
			opacity: 0.4;
		}

		.copied-toast {
			position: fixed;
			bottom: 30px;
			left: 50%;
			transform: translateX(-50%) translateY(20px);
			background: #22c55e;
			color: black;
			padding: 10px 18px;
			border-radius: 999px;
			font-size: 13px;
			opacity: 0;
			transition: 0.3s;
			box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
		}

		.copied-toast.show {
			opacity: 1;
			transform: translateX(-50%) translateY(0);
		}
	</style>
</head>

<body>

	<div class="card">
		<h2>✨ ABAP Comment-Generator</h2>

		<textarea id="input" placeholder="Your comment..."></textarea>

		<div class="code-wrapper" id="codeWrapper">
			<span class="hint">Click to copy</span>
			<pre id="output"></pre>
		</div>
	</div>

	<div class="copied-toast" id="toast">✔ Copied</div>

	<script>
		const input = document.getElementById("input");
    const output = document.getElementById("output");
    const wrapper = document.getElementById("codeWrapper");
    const toast = document.getElementById("toast");

    function generate(text) {
      const lines = text.split("\n").map(line => `*& ${line}`);
      return `*&---------------------------------------------------------------------*\n${lines.join("\n")}\n*&---------------------------------------------------------------------*`;
    }

    function update() {
      output.textContent = generate(input.value.trim());
    }

    input.addEventListener("input", update);

    wrapper.addEventListener("click", () => {
      navigator.clipboard.writeText(output.textContent);
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1200);
    });

    update();
	</script>

</body>

</html>
